# 工作流名称
name: rust_build

# 权限设置，允许写入仓库内容
permissions:
  contents: write

# 触发工作流的事件
on:
  push:
    # 当推送的标签以 "v" 开头时触发
    tags:
      - "v*"

jobs:
  # 标记版本发布的任务
  tagged-release:
    name: "Tagged Release"
    runs-on: "ubuntu-latest"
    steps:
      # 检出代码到工作目录
      - name: Checkout Code
        # 使用固定版本的 action 以提高稳定性
        uses: actions/checkout@v4

      # 创建版本发布
      - name: Create Release
        # 使用固定版本的 action 以提高稳定性
        uses: "marvinpinto/action-automatic-releases@v1.2.1"
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          prerelease: false

  # 上传资产的任务
  upload-assets:
    name: "Upload assets"
    # 矩阵策略，在不同操作系统和目标平台上运行任务
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: universal-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      # 检出代码到工作目录
      - name: Checkout Code
        # 使用固定版本的 action 以提高稳定性
        uses: actions/checkout@v4
      # 上传 Rust 二进制文件
      - name: "Upload rust binary"
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          ref: ${{ github.ref }}
          bin: quake
          target: ${{ matrix.target }}
          tar: unix
          zip: windows
          token: ${{ secrets.GITHUB_TOKEN }}
